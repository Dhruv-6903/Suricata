# =============================================================================
# Suricata Threshold Configuration
# File: /etc/suricata/threshold.conf
# Project: Suricata-Based NIDS with ELK Stack Integration
# =============================================================================
# Suppress or throttle specific alerts to reduce false positives.
# Format:
#   threshold gen_id <gid>, sig_id <sid>, type <limit|threshold|both>, \
#             track by_src|by_dst, count <n>, seconds <s>
#   suppress  gen_id <gid>, sig_id <sid> [, track by_src|by_dst, ip <addr>]
# =============================================================================

# ---------------------------------------------------------------------------
# Rate-limit noisy informational rules (prevent log flooding)
# ---------------------------------------------------------------------------

# Suppress ET INFO rules that fire too frequently in a normal environment
suppress gen_id 1, sig_id 2013028   # ET INFO suspicious user-agent

# Limit DNS NXDOMAIN floods to max 5 alerts per 60 s per source
threshold gen_id 1, sig_id 2025019, type threshold, track by_src, count 5, seconds 60

# Rate-limit ICMP alerts from a single source
threshold gen_id 1, sig_id 2100366, type threshold, track by_src, count 10, seconds 60

# ---------------------------------------------------------------------------
# Suppress alerts from known-safe internal addresses
# (Add your monitoring hosts / scanners here to avoid false positives)
# ---------------------------------------------------------------------------
# suppress gen_id 1, sig_id 0, track by_src, ip 192.168.1.5   # example scanner IP
# suppress gen_id 1, sig_id 0, track by_dst, ip 192.168.1.1   # example gateway

# ---------------------------------------------------------------------------
# Custom rule thresholds
# ---------------------------------------------------------------------------

# SSH brute-force: alert once per src IP per 5 minutes (avoid repetition)
threshold gen_id 1, sig_id 9000006, type threshold, track by_src, count 1, seconds 300

# DNS excessive queries: alert once per src IP per minute
threshold gen_id 1, sig_id 9000007, type threshold, track by_src, count 1, seconds 60

# ICMP sweep: alert once per src IP per 30 s
threshold gen_id 1, sig_id 9000009, type threshold, track by_src, count 1, seconds 30

# TCP SYN scan: alert once per src IP per minute
threshold gen_id 1, sig_id 9000010, type threshold, track by_src, count 1, seconds 60
