###################### Filebeat Configuration ################################
# Project: Suricata-Based NIDS with ELK Stack Integration
# Purpose: Collect Suricata EVE JSON logs and ship to Elasticsearch
##############################################################################

# =============================================================================
# Filebeat inputs
# =============================================================================
filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json   # Suricata EVE JSON output

    # Parse JSON directly from the log line
    json.keys_under_root: true
    json.overwrite_keys: true
    json.add_error_key: true
    json.expand_keys: true

    # Tag the source so Kibana dashboards can filter correctly
    tags: ["suricata", "ids", "nids"]

    # Custom fields
    fields:
      type: suricata
      logtype: eve-json
    fields_under_root: true

    # Multiline is not needed for JSON; one JSON object per line
    # Close inactive file handles after 5 minutes
    close_inactive: 5m
    # Begin reading at the start for initial ingestion
    scan_frequency: 10s
    # Seek to end of file on first run after that to avoid re-sending old data
    # (comment out 'tail_files' to re-ingest historical data)
    # tail_files: true

# =============================================================================
# Filebeat modules
# =============================================================================
filebeat.modules:
  - module: suricata
    eve:
      enabled: true
      # Override the default log path if necessary
      var.paths: ["/var/log/suricata/eve.json"]

# =============================================================================
# Processors
# =============================================================================
processors:
  # Add host metadata (OS, hostname, IP, etc.)
  - add_host_metadata:
      when.not.contains.tags: forwarded
  # Add cloud metadata when running on cloud providers
  - add_cloud_metadata: ~
  # Add Docker metadata when applicable
  - add_docker_metadata: ~

# =============================================================================
# Output – Elasticsearch
# =============================================================================
output.elasticsearch:
  hosts: ["https://localhost:9200"]   # Change to your Elasticsearch host/IP

  # Authentication (generated by Elasticsearch during setup)
  username: "elastic"
  password: "${ELASTICSEARCH_PASSWORD}"   # Set via environment variable or keystore

  # TLS / SSL settings
  ssl.enabled: true
  # Trust the CA certificate generated by Elasticsearch
  ssl.certificate_authorities: ["/etc/elasticsearch/certs/http_ca.crt"]
  # Disable if using self-signed certs in dev:
  # ssl.verification_mode: none

  # Data stream / index settings
  indices:
    - index: "suricata-alerts-%{+yyyy.MM.dd}"
      when.equals:
        event_type: "alert"
    - index: "suricata-dns-%{+yyyy.MM.dd}"
      when.equals:
        event_type: "dns"
    - index: "suricata-http-%{+yyyy.MM.dd}"
      when.equals:
        event_type: "http"
    - index: "suricata-tls-%{+yyyy.MM.dd}"
      when.equals:
        event_type: "tls"
    - index: "suricata-flow-%{+yyyy.MM.dd}"
      when.equals:
        event_type: "flow"
    - index: "suricata-logs-%{+yyyy.MM.dd}"

  # Retry settings
  max_retries: 3
  bulk_max_size: 2048

# =============================================================================
# Kibana (for dashboard setup)
# =============================================================================
setup.kibana:
  host: "https://localhost:5601"   # Change to your Kibana host/IP
  username: "elastic"
  password: "${ELASTICSEARCH_PASSWORD}"
  ssl.enabled: true
  ssl.certificate_authorities: ["/etc/elasticsearch/certs/http_ca.crt"]

# Load pre-built Suricata dashboards
setup.dashboards.enabled: true

# Load index templates
setup.template.enabled: true
setup.template.name: "suricata"
setup.template.pattern: "suricata-*"
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0
  index.codec: best_compression

# ILM (Index Lifecycle Management) policy
setup.ilm.enabled: true
setup.ilm.rollover_alias: "suricata"
setup.ilm.pattern: "{now/d}-000001"

# =============================================================================
# Logging
# =============================================================================
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# =============================================================================
# Monitoring (optional – requires X-Pack / Elastic Stack monitoring)
# =============================================================================
# monitoring.enabled: false
